name: Weather App Pages Hot Deploy

on:
  push:
    branches:
      - master
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/configure-pages@v5

      - name: Hydrate deployed weather data
        working-directory: misc/weather-app
        run: node scripts/hydrate-data.mjs

      - name: Generate weather datasets
        working-directory: misc/weather-app
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node scripts/generate-data.mjs forecast
          else
            node scripts/generate-data.mjs all
          fi

      - name: Stage Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ ./_site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
