name: Weather App Pages Cold Deploy

on:
  schedule:
    - cron: "5 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/configure-pages@v5

      - name: Hydrate deployed weather data
        working-directory: misc/weather-app
        run: node scripts/hydrate-data.mjs

      - name: Generate history and outlook
        working-directory: misc/weather-app
        run: |
          node scripts/generate-data.mjs history
          node scripts/generate-data.mjs outlook

      - name: Stage Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ ./_site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
